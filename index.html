<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta property="og:title" content="GymTracker" />
    <meta property="og:description" content="Persönlicher Trainingsplan & Workout-Tracker" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <title>GymTracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Restore route from 404.html redirect
      (function() {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) window.history.replaceState(null, '', p);
      })();
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
